
<!-- Step 4: Track - Chart only, no trophy -->
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Chart card -->
  <rect x="15" y="25" width="170" height="140" rx="14" fill="#2a2a3e"/>
  <!-- Top label -->
  <rect x="28" y="38" width="60" height="8" rx="4" fill="#444"/>
  <rect x="148" y="38" width="28" height="8" rx="4" fill="#7C3AED" opacity="0.7"/>
  <!-- Grid lines -->
  <line x1="30" y1="70" x2="170" y2="70" stroke="#333" stroke-width="1"/>
  <line x1="30" y1="90" x2="170" y2="90" stroke="#333" stroke-width="1"/>
  <line x1="30" y1="110" x2="170" y2="110" stroke="#333" stroke-width="1"/>
  <line x1="30" y1="130" x2="170" y2="130" stroke="#333" stroke-width="1"/>
  <!-- Upward line -->
  <polyline points="35,138 62,128 89,112 116,90 143,68 170,50"
    fill="none" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Area -->
  <polygon points="35,138 62,128 89,112 116,90 143,68 170,50 170,148 35,148"
    fill="#7C3AED" opacity="0.12"/>
  <!-- Dots -->
  <circle cx="35" cy="138" r="4" fill="#7C3AED"/>
  <circle cx="62" cy="128" r="4" fill="#7C3AED"/>
  <circle cx="89" cy="112" r="4" fill="#7C3AED"/>
  <circle cx="116" cy="90" r="4" fill="#7C3AED"/>
  <circle cx="143" cy="68" r="4" fill="#7C3AED"/>
  <!-- Last dot highlighted -->
  <circle cx="170" cy="50" r="7" fill="#7C3AED" opacity="0.25"/>
  <circle cx="170" cy="50" r="4.5" fill="#7C3AED" stroke="white" stroke-width="2"/>
  <!-- Value bubble -->
  <rect x="148" y="30" width="38" height="16" rx="8" fill="#7C3AED"/>
  <line x1="170" y1="46" x2="170" y2="50" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="155" y="42" font-size="9" font-weight="bold" fill="white">+12 kg</text>
  <!-- X axis labels -->
  <text x="30" y="160" font-size="8" fill="#555">Mon</text>
  <text x="56" y="160" font-size="8" fill="#555">Tue</text>
  <text x="83" y="160" font-size="8" fill="#555">Wed</text>
  <text x="109" y="160" font-size="8" fill="#555">Thu</text>
  <text x="136" y="160" font-size="8" fill="#555">Fri</text>
  <text x="163" y="160" font-size="8" fill="#7C3AED">Sat</text>
</svg>